name: Patch VBMeta

on:
  workflow_dispatch:
    inputs:
      ARCHITECTURE:
        description: 'Architecture'
        required: true
        default: 'x86_64'
        type: choice
        options:
        - x86_64
        - x86
        - arm64-v8a
        - armeabi-v7a

permissions:
  contents: write

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    steps:
 
    - name: Check Out
      uses: actions/checkout@v3.1.0
      
    - name: Operating System Information
      run: |
        uname -a
        
    - name: Patch File Information
      run: |
        file ${{ github.event.inputs.ARCHITECTURE }}/vbmeta-disable-verification
        
    - name: Give Permission and Run Patch
      run: |
        ARCH="${{ github.event.inputs.ARCHITECTURE }}"
        BIN="./${ARCH}/vbmeta-disable-verification"
        chmod +x "$BIN"

        case "$ARCH" in
          x86_64)
            "$BIN" vbmeta.img
            ;;
          x86|arm64-v8a|armeabi-v7a)
            sudo apt-get update -qq
            sudo apt-get install -y -qq qemu-user-static
            case "$ARCH" in
              x86) QEMU=qemu-i386-static ;;
              arm64-v8a) QEMU=qemu-aarch64-static ;;
              armeabi-v7a) QEMU=qemu-arm-static ;;
            esac
            "$QEMU" "$BIN" vbmeta.img
            ;;
        esac

    - name: Upload to Release
      uses: ncipollo/release-action@v1.12.0
      with:
        artifacts: vbmeta.img
        Name: Patched VBMeta
        draft: false
        prerelease: true
        tag: ${{ github.run_id }}
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          Your vbmeta image are now ready!
          Flash it now.

    - name: Link to Release
      run: |
        echo "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ github.run_id }}"
